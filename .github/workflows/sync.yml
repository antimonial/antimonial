name: Sync Framework

# Keeps the skeleton in step with antimonial/framework automatically.
# Runs daily and can be triggered manually. When a newer framework tag exists,
# it updates the dependency, regenerates composer.lock, commits and tags the
# skeleton with the SAME version number as the framework.

on:
  schedule:
    # Daily at 03:41 UTC — quiet time, away from the CI smoke test (03:17)
    - cron: '41 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, tokenizer, ctype, json, dom, pdo_sqlite
          tools: composer

      - name: Resolve versions
        id: versions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FW_TAG=$(gh api repos/antimonial/framework/tags --jq '.[0].name')
          SK_TAG=$(gh api repos/antimonial/antimonial/tags --jq '.[0].name')

          echo "Framework latest: $FW_TAG"
          echo "Skeleton latest:  $SK_TAG"

          FW_VER=${FW_TAG#v}
          SK_VER=${SK_TAG#v}

          # Already in sync or skeleton ahead -> nothing to do.
          if [ "$(printf '%s\n%s\n' "$FW_VER" "$SK_VER" | sort -V | tail -n1)" = "$SK_VER" ]; then
            echo "Skeleton is up to date ($SK_VER) or newer than framework ($FW_VER)."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # If the target skeleton tag already exists, do not overwrite it.
          if git rev-parse "$FW_TAG" >/dev/null 2>&1; then
            echo "Tag $FW_TAG already exists in skeleton; skipping."
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAJOR=$(echo "$FW_VER" | cut -d. -f1)
          MINOR=$(echo "$FW_VER" | cut -d. -f2)

          {
            echo "needs_update=true"
            echo "fw_tag=$FW_TAG"
            echo "fw_ver=$FW_VER"
            echo "constraint=~$MAJOR.$MINOR"
          } >> "$GITHUB_OUTPUT"

      - name: Update framework constraint
        if: steps.versions.outputs.needs_update == 'true'
        run: |
          CONSTRAINT="${{ steps.versions.outputs.constraint }}"
          echo "Setting antimonial/framework constraint to $CONSTRAINT"
          php -r '
            $f = "composer.json";
            $data = json_decode(file_get_contents($f), true);
            $data["require"]["antimonial/framework"] = "'$CONSTRAINT'";
            file_put_contents($f, json_encode($data, JSON_PRETTY_PRINT | JSON_UNESCAPED_SLASHES | JSON_UNESCAPED_UNICODE) . "\n");
          '

      - name: Regenerate composer.lock
        if: steps.versions.outputs.needs_update == 'true'
        run: composer update antimonial/framework --no-interaction --prefer-dist --optimize-autoloader

      - name: Commit, tag and push
        if: steps.versions.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add composer.json composer.lock
          git commit -m "chore: sync framework ${{ steps.versions.outputs.fw_tag }} [skip ci]"

          TAG="${{ steps.versions.outputs.fw_tag }}"
          git tag "$TAG"
          git push origin HEAD --tags
