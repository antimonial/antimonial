name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily at 03:17 UTC — catches new framework ~0.9 releases automatically
    - cron: '17 3 * * *'

jobs:
  smoke:
    name: Framework compatibility smoke test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, tokenizer, ctype, json, dom, pdo_sqlite
          tools: composer

      # No composer.lock is committed (by design), so this resolves the
      # latest antimonial/framework satisfying "~0.9" — keeping the
      # skeleton automatically in sync with framework patch/minor releases.
      - name: Install (latest allowed framework)
        run: composer update --no-interaction --prefer-dist --optimize-autoloader

      - name: Verify framework loads
        run: |
          php -r "require 'vendor/autoload.php'; \
          \$v = \\Antimonial\\Core\\App::class; \
          echo \"Framework class present: \$v\n\";"

      - name: Boot the app (smoke)
        run: |
          php -r "require 'vendor/autoload.php'; \
          \\Antimonial\\Core\\Config::load('app'); \
          echo \"Config loaded OK\n\";"
